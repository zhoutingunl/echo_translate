<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EchoTranslate · QoS Dashboard</title>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem("et-theme")||"light";}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="logo">📊</span>
    <div>
      <h1>QoS Dashboard</h1>
      <p class="tagline">实时质量指标 · design.md §12-13</p>
    </div>
  </div>
  <div class="top-actions">
    <select id="themeSel" class="theme-sel" aria-label="配色主题" title="切换配色">
      <option value="light">🌤 微光</option>
      <option value="sky">🌊 天青</option>
      <option value="sunset">🌅 暮色</option>
      <option value="ocean">🌌 深海</option>
      <option value="grape">🍇 夜紫</option>
    </select>
    <a class="pill pill-link" href="/">← 返回字幕</a>
  </div>
</header>

<main class="dash">
  <div class="eyebrow" style="margin-bottom:12px">实时指标 · 每 2 秒刷新</div>
  <div class="grid" id="metrics"></div>

  <div class="card-lg">
    <h3 class="panel-h">会话历史</h3>
    <table id="sessions" class="data-table"><thead><tr><th>Session</th><th>语言</th><th>模式</th><th>字幕数</th><th>开始时间</th></tr></thead><tbody></tbody></table>
  </div>
  <div class="card-lg">
    <h3 class="panel-h">埋点事件 <span class="muted mono">track</span></h3>
    <table id="events" class="data-table"><thead><tr><th>事件</th><th>次数</th></tr></thead><tbody></tbody></table>
  </div>
</main>

<script>
  // keep the theme picker in sync across pages
  (function(){ var s=document.getElementById("themeSel"); if(!s) return;
    s.value=document.documentElement.dataset.theme||"light";
    s.onchange=function(e){ document.documentElement.dataset.theme=e.target.value;
      try{ localStorage.setItem("et-theme", e.target.value); }catch(_){} };
  })();
</script>
<script src="/static/dashboard.js"></script>
</body>
</html>
